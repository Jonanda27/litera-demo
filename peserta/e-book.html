<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Koleksi E-Book - LITERA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }
    
    .book-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .book-card:hover { transform: translateY(-8px); }

    /* RESPONSIVE SIDEBAR LOGIC */
    #sidebar { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    #mainContent { transition: margin 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    
    /* Default: Layar Kecil (Mobile/Tablet) */
    @media (max-width: 1023px) {
      #sidebar { transform: translateX(-100%); }
      #mainContent { margin-left: 0; }
      #mobileOverlay { display: none; opacity: 0; transition: opacity 0.3s; }
      
      body.sidebar-open #sidebar { transform: translateX(0); }
      body.sidebar-open #mobileOverlay { display: block; opacity: 1; }
      body.sidebar-open { overflow: hidden; } /* Cegah scroll saat menu terbuka */
    }

    /* Default: Layar Besar (Desktop) */
    @media (min-width: 1024px) {
      #sidebar { transform: translateX(0); }
      #mainContent { margin-left: 16rem; /* 256px / w-64 */ }
      #mobileOverlay { display: none !important; }
    }
  </style>
</head>
<body class="relative min-h-screen">

  <nav class="fixed top-0 left-0 right-0 z-[60] h-20 bg-white/95 backdrop-blur-md border-b border-slate-100 shadow-sm">
    <div class="max-w-[1600px] mx-auto px-4 sm:px-6 lg:px-10 h-full flex items-center justify-between">
      <div class="flex items-center gap-3 md:gap-4">
        <button onclick="toggleSidebar()" class="flex lg:hidden w-10 h-10 flex-col justify-center items-center gap-[5px] text-slate-800 hover:bg-slate-100 rounded-lg transition-all cursor-pointer outline-none">
          <div class="w-5 h-[2px] bg-slate-800 rounded-full"></div>
          <div class="w-5 h-[2px] bg-slate-800 rounded-full"></div>
          <div class="w-5 h-[2px] bg-slate-800 rounded-full"></div>
        </button>

        <div class="w-8 h-8 md:w-10 md:h-10 flex items-center justify-center shrink-0">
          <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/eb/Coat_of_arms_of_Jakarta.svg/500px-Coat_of_arms_of_Jakarta.svg.png" alt="Logo Jakarta" class="w-full h-full object-contain">
        </div>
        <span class="text-xl md:text-2xl font-black text-slate-900 tracking-tighter">LITERA</span>
      </div>
      <div class="flex items-center justify-end gap-4">
        <div class="text-right leading-tight hidden md:block">
          <p class="text-sm font-black text-slate-900">Anisa Panduwinata</p>
          <p class="text-[10px] font-bold text-emerald-600 uppercase tracking-[0.2em]">Peserta</p>
        </div>
        <div class="w-10 h-10 rounded-xl bg-emerald-600 text-white flex items-center justify-center font-black shadow-lg shadow-emerald-200">A</div>
      </div>
    </div>
  </nav>

  <div id="mobileOverlay" class="fixed inset-0 bg-black/50 z-30" onclick="closeSidebar()"></div>

  <aside id="sidebar" class="fixed left-0 top-20 h-[calc(100vh-80px)] bg-emerald-700 z-40 w-64 shadow-xl lg:shadow-none">
    <div class="py-8 px-4 flex flex-col gap-2 overflow-y-auto h-full text-white custom-scrollbar">
      <a href="dashboard.html" class="px-4 py-3 rounded-lg font-bold text-sm hover:bg-white/10 transition-all">Dashboard</a>
      <a href="exercise.html" class="px-4 py-3 rounded-lg font-bold text-sm hover:bg-white/10 transition-all">Exercise</a>
      <a href="experience.html" class="px-4 py-3 rounded-lg font-bold text-sm hover:bg-white/10 transition-all">Experience</a>
      <a href="experiment.html" class="px-4 py-3 rounded-lg font-bold text-sm hover:bg-white/10 transition-all">Experiment</a>
      <a href="livesession.html" class="px-4 py-3 rounded-lg font-bold text-sm hover:bg-white/10 transition-all">Live Session</a>
      <a href="sertifikasi.html" class="px-4 py-3 rounded-lg font-bold text-sm hover:bg-white/10 transition-all">Sertifikasi</a>
      <a href="tools.html" class="px-4 py-3 rounded-lg font-bold text-sm hover:bg-white/10 transition-all">Tools Pendukung</a>
      <a href="e-book.html" class="px-4 py-3 rounded-lg font-bold text-sm bg-white text-emerald-700 transition-all shadow-md"> E-Book</a>
      <a href="hubmentor.html" class="px-4 py-3 rounded-lg font-bold text-sm text-white hover:bg-white/10 transition-all">Hubungi Mentor</a>
      
      <div class="mt-auto pt-4 border-t border-white/20">
        <a href="../landingpage.html" class="px-4 py-3 rounded-lg font-bold text-sm text-white hover:bg-slate-800 transition-all flex items-center gap-3">
          <svg class="w-5 h-5 text-emerald-200" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
          Logout
        </a>
      </div>
    </div>
  </aside>

  <main id="mainContent" class="pt-24 pb-20 transition-all duration-300 min-h-screen">
    <div class="max-w-[1400px] mx-auto px-4 sm:px-6 md:px-8 py-6 md:py-10 space-y-8">
      
      <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center gap-6">
        <div class="space-y-1">
          <div class="flex items-center gap-2">
            <span class="text-indigo-500">✨</span>
            <p class="text-[10px] md:text-xs font-black text-indigo-500 uppercase tracking-widest">Digital Archive</p>
          </div>
          <h1 class="text-3xl md:text-4xl font-black text-slate-900 tracking-tighter uppercase leading-none">Koleksi <span class="text-indigo-600">E-Book</span></h1>
        </div>

        <div class="relative w-full lg:max-w-md">
          <input type="text" placeholder="Cari referensi naskah..." class="w-full pl-6 pr-12 py-3.5 md:py-4 rounded-[2rem] bg-white border border-slate-100 shadow-sm focus:ring-2 focus:ring-emerald-500 outline-none font-medium text-sm transition-all">
          <div class="absolute right-5 top-1/2 -translate-y-1/2 text-slate-300">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-width="2.5" stroke-linecap="round"/></svg>
          </div>
        </div>
      </div>

      <div class="flex overflow-x-auto custom-scrollbar pb-2 md:pb-0">
          <div class="flex bg-slate-100 p-1.5 rounded-2xl w-max border border-slate-200 shadow-inner">
            <button class="px-6 md:px-8 py-2 md:py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest bg-slate-800 text-white shadow-lg transition-all whitespace-nowrap">Semua</button>
            <button class="px-6 md:px-8 py-2 md:py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest text-slate-400 hover:text-emerald-600 transition-all whitespace-nowrap">Fiksi</button>
            <button class="px-6 md:px-8 py-2 md:py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest text-slate-400 hover:text-emerald-600 transition-all whitespace-nowrap">Non-Fiksi</button>
          </div>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 md:gap-8">
        
        <div class="book-card bg-white rounded-[2.5rem] md:rounded-[3rem] p-5 md:p-6 shadow-xl shadow-slate-200/50 border border-slate-50 relative group">
          <div class="absolute top-6 left-8 md:top-8 md:left-10 z-10 bg-indigo-600 text-white px-3 md:px-4 py-1.5 rounded-lg flex items-center gap-2 shadow-lg">
             <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path d="M5 4a2 2 0 012-2h6a2 2 0 012 2v14l-5-2.5L5 18V4z"/></svg>
             <span class="text-[8px] md:text-[9px] font-black uppercase tracking-widest">Fiksi</span>
          </div>

          <div class="aspect-[3/4] rounded-[2rem] md:rounded-[2.5rem] overflow-hidden bg-slate-100 mb-5 md:mb-6 shadow-inner relative">
             <img src="https://images.unsplash.com/photo-1543002588-bfa74002ed7e?w=500&auto=format&fit=crop" alt="Cover" class="w-full h-full object-cover">
             <div class="absolute inset-0 bg-slate-900/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                <span class="bg-white text-slate-900 px-5 md:px-6 py-2 rounded-full font-black text-[9px] md:text-[10px] uppercase tracking-widest shadow-xl">Baca Sekarang</span>
             </div>
          </div>

          <div class="px-1 md:px-2 space-y-4 md:space-y-6">
            <h3 class="text-lg md:text-xl font-black text-slate-800 uppercase tracking-tight leading-tight">Ayam Hitam</h3>
            
            <div class="pt-4 md:pt-6 border-t border-slate-50 flex justify-between items-center">
              <div class="flex items-center gap-2 text-slate-400">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" stroke-width="2" stroke-linecap="round"/></svg>
                <span class="text-[8px] md:text-[9px] font-black uppercase tracking-widest">E-Book</span>
              </div>
              <button class="w-10 h-10 md:w-12 md:h-12 bg-slate-50 hover:bg-emerald-600 text-slate-400 hover:text-white rounded-xl md:rounded-2xl flex items-center justify-center transition-all shadow-sm border border-slate-100">
                <svg class="w-4 h-4 md:w-5 md:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-4l-4 4m0 0l-4-4m4 4V4" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </button>
            </div>
          </div>
        </div>

        <div class="book-card bg-white rounded-[2.5rem] md:rounded-[3rem] p-5 md:p-6 shadow-xl shadow-slate-200/50 border border-slate-50 relative group">
          <div class="absolute top-6 left-8 md:top-8 md:left-10 z-10 bg-emerald-600 text-white px-3 md:px-4 py-1.5 rounded-lg flex items-center gap-2 shadow-lg">
             <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path d="M5 4a2 2 0 012-2h6a2 2 0 012 2v14l-5-2.5L5 18V4z"/></svg>
             <span class="text-[8px] md:text-[9px] font-black uppercase tracking-widest">Fiksi</span>
          </div>
          <div class="aspect-[3/4] rounded-[2rem] md:rounded-[2.5rem] overflow-hidden bg-slate-100 mb-5 md:mb-6 shadow-inner relative">
             <img src="https://images.unsplash.com/photo-1512820790803-83ca734da794?w=500&auto=format&fit=crop" alt="Cover" class="w-full h-full object-cover">
             <div class="absolute inset-0 bg-slate-900/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                <span class="bg-white text-slate-900 px-5 md:px-6 py-2 rounded-full font-black text-[9px] md:text-[10px] uppercase tracking-widest shadow-xl">Baca Sekarang</span>
             </div>
          </div>
          <div class="px-1 md:px-2 space-y-4 md:space-y-6">
            <h3 class="text-lg md:text-xl font-black text-slate-800 uppercase tracking-tight leading-tight">Pintu Yang Tak Seharusnya Dibuka</h3>
            <div class="pt-4 md:pt-6 border-t border-slate-50 flex justify-between items-center">
              <div class="flex items-center gap-2 text-slate-400">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" stroke-width="2" stroke-linecap="round"/></svg>
                <span class="text-[8px] md:text-[9px] font-black uppercase tracking-widest">E-Book</span>
              </div>
              <button class="w-10 h-10 md:w-12 md:h-12 bg-slate-50 hover:bg-emerald-600 text-slate-400 hover:text-white rounded-xl md:rounded-2xl flex items-center justify-center transition-all shadow-sm border border-slate-100">
                <svg class="w-4 h-4 md:w-5 md:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-4l-4 4m0 0l-4-4m4 4V4" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </button>
            </div>
          </div>
        </div>

      </div>
    </div>
  </main>

  <script>
    // --- SIDEBAR RESPONSIVE LOGIC ---
    function toggleSidebar() {
      const body = document.body;
      if (window.innerWidth < 1024) {
        body.classList.toggle('sidebar-open');
      }
    }

    function closeSidebar() {
      if (window.innerWidth < 1024) {
        document.body.classList.remove('sidebar-open');
      }
    }

    // Hindari bug tampilan jika me-resize layar dalam kondisi menu terbuka
    window.addEventListener('resize', () => {
      if (window.innerWidth >= 1024) {
        document.body.classList.remove('sidebar-open');
      }
    });
  </script>
</body>
</html>
