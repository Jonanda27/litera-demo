<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Manager - LITERA Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    .live-indicator { animation: pulse-red 2s infinite; }
    @keyframes pulse-red {
      0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
      70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(239, 68, 68, 0); }
      100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
    }
  </style>
</head>
<body class="relative overflow-x-hidden">

  <nav class="fixed top-0 left-0 right-0 z-50 h-20 bg-white/95 backdrop-blur-md border-b border-slate-100 shadow-sm">
    <div class="max-w-[1600px] mx-auto px-4 sm:px-6 lg:px-10 h-full flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 flex items-center justify-center shrink-0">
          <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/eb/Coat_of_arms_of_Jakarta.svg/500px-Coat_of_arms_of_Jakarta.svg.png" alt="Logo Jakarta" class="w-full h-full object-contain">
        </div>
        <span class="text-xl font-black text-slate-800 tracking-tighter">LITERA</span>
      </div>
      <div class="flex items-center justify-end gap-4">
        <div class="text-right leading-tight hidden md:block">
          <p class="text-sm font-black text-slate-900">Administrator</p>
          <p class="text-[10px] font-bold text-emerald-600 uppercase tracking-[0.2em]">Stream Control</p>
        </div>
        <div class="w-10 h-10 rounded-xl bg-slate-800 text-white flex items-center justify-center font-black shadow-lg">AD</div>
      </div>
    </div>
  </nav>

  <div id="mobileOverlay" class="fixed inset-0 bg-black/50 z-30 hidden" onclick="toggleSidebar()"></div>

  <aside id="sidebar" class="fixed left-0 top-20 h-[calc(100vh-80px)] bg-emerald-700 transition-all duration-300 z-40 w-64 lg:translate-x-0 -translate-x-full">
    <div class="py-8 px-4 flex flex-col gap-2 overflow-y-auto h-full text-white">
      <a href="dashboard.html" class="px-4 py-3 rounded-lg font-bold text-sm hover:bg-white/10 transition-all">Dashboard</a>
      <a href="manajemenakun.html" class="px-4 py-3 rounded-lg font-bold text-sm hover:bg-white/10 transition-all">Manajemen Akun</a>
      <a href="livesession.html" class="px-4 py-3 rounded-lg font-bold text-sm bg-white text-emerald-700 transition-all">Atur Live Session</a>
      <a href="manajemenmodul.html" class="px-4 py-3 rounded-lg font-bold text-sm hover:bg-white/10 transition-all">Manajemen Modul</a>
      <a href="logmentor.html" class="px-4 py-3 rounded-lg font-bold text-sm hover:bg-white/10 transition-all">Log Mentor</a>
      <div class="mt-auto">
        <a href="../landingpage.html" class="px-4 py-3 rounded-lg font-bold text-sm hover:bg-rose-600 transition-all flex items-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/></svg>
            Logout
        </a>
      </div>
    </div>
  </aside>

  <button onclick="toggleSidebar()" id="sidebarToggle" class="fixed top-24 bg-white border border-slate-200 rounded-r-lg p-2 z-50 shadow-md transition-all duration-300 left-0 lg:left-64 lg:hidden">
    <svg class="w-4 h-4 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path id="toggleIcon" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
    </svg>
  </button>

  <div id="mainContent" class="pt-20 transition-all duration-300 min-h-screen lg:ml-64 ml-0">
    <div class="max-w-[1400px] mx-auto px-4 sm:px-6 md:px-8 py-6 md:py-10 space-y-8">
      
      <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
        <div>
          <div class="flex items-center gap-2 mb-1">
            <div class="w-6 h-1 bg-emerald-600 rounded-full"></div>
            <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">Stream Control Panel</p>
          </div>
          <h1 class="text-4xl font-black text-slate-800 tracking-tighter uppercase leading-none">Live<span class="text-emerald-600">Manager</span></h1>
        </div>
        <button class="bg-slate-900 hover:bg-emerald-600 text-white px-8 py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl transition-all active:scale-95 flex items-center gap-3 group">
          <div class="w-6 h-6 bg-white/10 rounded-lg flex items-center justify-center group-hover:bg-white/20 transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" stroke-linecap="round" stroke-linejoin="round" stroke-width="3"/></svg>
          </div>
          Buat Sesi Baru
        </button>
      </div>

      <div class="flex flex-col lg:flex-row gap-4 items-stretch">
        <div class="relative flex-1">
          <span class="absolute left-6 top-1/2 -translate-y-1/2 text-slate-400">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/></svg>
          </span>
          <input type="text" placeholder="Cari berdasarkan judul atau speaker..." class="w-full pl-14 pr-6 py-5 rounded-[2rem] bg-white border border-slate-100 shadow-sm focus:ring-2 focus:ring-emerald-500 outline-none font-medium text-sm text-slate-700 transition-all">
        </div>
        <div class="bg-white px-8 py-5 rounded-[2rem] border border-slate-100 shadow-sm flex items-center gap-3">
          <div class="w-2.5 h-2.5 rounded-full bg-emerald-500 animate-pulse"></div>
          <p class="text-[11px] font-black text-slate-400 uppercase tracking-widest">Total Sesi: <span class="text-slate-800 ml-1 text-sm font-black">1</span></p>
        </div>
      </div>

      <div class="space-y-4">
        
        <div class="bg-white p-6 md:p-8 rounded-[3rem] border border-slate-50 shadow-xl shadow-slate-200/40 flex flex-col md:flex-row items-center justify-between gap-8 transition-all hover:scale-[1.01]">
          
          <div class="flex flex-col md:flex-row items-center gap-8 flex-1 w-full">
            <div class="relative shrink-0">
              <div class="w-24 h-24 bg-emerald-50 rounded-[2rem] flex items-center justify-center text-emerald-600 shadow-inner">
                <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/></svg>
              </div>
              <div class="absolute -top-1 -right-1 w-5 h-5 bg-rose-500 border-4 border-white rounded-full live-indicator shadow-md"></div>
            </div>

            <div class="text-center md:text-left flex-1 min-w-0">
              <div class="flex items-center justify-center md:justify-start gap-3 mb-2">
                <h2 class="text-2xl font-black text-slate-800 uppercase tracking-tight truncate">Tes1</h2>
                <span class="flex items-center gap-1.5 px-3 py-1 bg-rose-50 border border-rose-100 text-rose-500 rounded-full text-[9px] font-black uppercase tracking-widest">
                  <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path d="M2 10a8 8 0 018-8v8h8a8 8 0 11-16 0z"/></svg>
                  Live Now
                </span>
              </div>
              
              <div class="flex flex-wrap justify-center md:justify-start items-center gap-4">
                <div class="flex items-center gap-2 bg-blue-50/50 px-3 py-1.5 rounded-xl border border-blue-100">
                  <svg class="w-4 h-4 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/></svg>
                  <span class="text-[10px] font-black text-blue-600 uppercase tracking-widest">Yosua</span>
                </div>
                <div class="flex items-center gap-2 bg-amber-50/50 px-3 py-1.5 rounded-xl border border-amber-100">
                  <svg class="w-4 h-4 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/></svg>
                  <span class="text-[10px] font-black text-amber-600 uppercase tracking-widest">3 Apr 2026, 23.50</span>
                </div>
              </div>
            </div>
          </div>

          <div class="flex items-center gap-3 bg-slate-50/80 p-3 rounded-[2rem] border border-slate-100 shadow-inner">
            <button class="w-12 h-12 bg-slate-900 text-white rounded-2xl flex items-center justify-center shadow-lg hover:bg-emerald-600 transition-all active:scale-90">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"/></svg>
            </button>
            <button class="w-12 h-12 bg-white text-rose-500 rounded-2xl flex items-center justify-center border border-rose-100 shadow-sm hover:bg-rose-500 hover:text-white transition-all active:scale-90">
              <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8 7a1 1 0 00-1 1v4a1 1 0 001 1h4a1 1 0 001-1V8a1 1 0 00-1-1H8z" clip-rule="evenodd"/></svg>
            </button>
            <button class="w-12 h-12 bg-white text-slate-400 rounded-2xl flex items-center justify-center border border-slate-200 shadow-sm hover:bg-rose-50 hover:text-rose-600 transition-all active:scale-90">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/></svg>
            </button>
          </div>

        </div>

      </div>

    </div>
  </div>

  <script>
    let isSidebarOpen = false;
    function toggleSidebar() {
      isSidebarOpen = !isSidebarOpen;
      const sidebar = document.getElementById('sidebar');
      const mobileOverlay = document.getElementById('mobileOverlay');
      const sidebarToggle = document.getElementById('sidebarToggle');
      const toggleIcon = document.getElementById('toggleIcon');
      
      if (window.innerWidth < 1024) {
        if (isSidebarOpen) {
          sidebar.classList.remove('-translate-x-full');
          mobileOverlay.classList.remove('hidden');
          sidebarToggle.classList.add('left-64');
          toggleIcon.setAttribute('d', 'M15 19l-7-7 7-7');
        } else {
          sidebar.classList.add('-translate-x-full');
          mobileOverlay.classList.add('hidden');
          sidebarToggle.classList.remove('left-64');
          toggleIcon.setAttribute('d', 'M9 5l7 7-7 7');
        }
      }
    }
  </script>
</body>
</html>
