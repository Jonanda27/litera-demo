<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - LITERA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-slide-up {
      animation: slideUp 0.6s ease-out forwards;
    }
  </style>
</head>
<body class="min-h-screen bg-white text-slate-900">

  <nav class="fixed top-0 left-0 right-0 z-50 bg-white/95 backdrop-blur-md border-b border-slate-100">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <div class="w-10 h-10 bg-red-600 rounded-lg flex items-center justify-center shadow-lg shadow-red-200 shrink-0">
          <span class="text-white font-bold text-xl">L</span>
        </div>
        <span class="text-xl font-bold text-slate-900 tracking-tight">LITERA</span>
      </div>
      
      <div class="hidden lg:flex items-center gap-8">
        <a href="#" class="text-slate-600 hover:text-red-600 font-medium transition-colors">Beranda</a>
        <a href="#" class="text-slate-600 hover:text-red-600 font-medium transition-colors">Latihan</a>
        <a href="#" class="text-slate-600 hover:text-red-600 font-medium transition-colors">Live Session</a>
        <a href="#" class="text-slate-600 hover:text-red-600 font-medium transition-colors">Eksperimen</a>
        <a href="#" class="text-slate-600 hover:text-red-600 font-medium transition-colors">Pengalaman</a>
      </div>

      <div class="hidden lg:flex items-center gap-3">
        <a href="login.html" class="px-5 py-2.5 bg-red-600 text-white font-medium hover:bg-red-700 rounded-lg transition-all shadow-md shadow-red-100">Masuk</a>
        <a href="register.html" class="px-5 py-2.5 text-slate-700 font-medium hover:bg-slate-50 rounded-lg transition-colors">Daftar</a>
      </div>

      <button class="lg:hidden p-2 text-slate-600 hover:text-red-600 transition-colors">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </button>
    </div>
  </nav>

  <div class="pt-24 px-6 md:px-8">
    <div class="max-w-7xl mx-auto">
      <div class="flex items-center gap-2 text-sm">
        <a href="index.html" class="text-slate-400 hover:text-red-600 transition-colors">Home</a>
        <span class="text-slate-300">/</span>
        <span class="text-slate-800 font-medium">Masuk</span>
      </div>
    </div>
  </div>

  <div class="flex items-center justify-center min-h-[calc(100vh-140px)] px-4 py-8 md:py-12">
    <div class="bg-white rounded-3xl p-6 md:p-8 w-full max-w-md border border-slate-100 shadow-[0_20px_50px_rgba(220,38,38,0.15)] hover:shadow-[0_20px_60px_rgba(220,38,38,0.25)] transition-all duration-500 animate-slide-up">
      
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-14 h-14 md:w-16 md:h-16 bg-red-50 rounded-2xl mb-4 border border-red-100">
          <svg class="w-7 h-7 md:w-8 md:h-8 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
          </svg>
        </div>
        <h1 class="text-2xl md:text-3xl font-extrabold text-slate-900">Selamat Datang</h1>
        <p class="text-slate-500 text-sm mt-2">Silakan masuk untuk melanjutkan belajar</p>

        <div class="mt-4 p-3 bg-blue-50 border border-blue-100 text-blue-700 text-xs font-medium rounded-xl text-left">
          <strong>Gunakan Akun Dummy Ini:</strong><br/>
          Email: peserta@litera.com<br/>
          Pass: password123
        </div>
        
        <div id="error-message" class="hidden mt-4 p-3 bg-red-50 border border-red-100 text-red-600 text-xs font-medium rounded-xl"></div>
      </div>
      
      <form id="loginForm" class="space-y-5">
        <div class="space-y-1.5">
          <label class="block text-sm text-slate-700 font-semibold ml-1">Email</label>
          <input type="email" id="email" class="w-full px-4 py-3 border-2 rounded-xl outline-none text-slate-900 font-medium transition-all duration-300 border-slate-100 bg-slate-50/50 focus:border-red-600 focus:shadow-lg focus:shadow-red-100 focus:bg-white" placeholder="name@email.com" required>
        </div>
        
        <div class="space-y-1.5">
          <label class="block text-sm text-slate-700 font-semibold ml-1">Password</label>
          <input type="password" id="password" class="w-full px-4 py-3 border-2 rounded-xl outline-none text-slate-900 font-medium transition-all duration-300 border-slate-100 bg-slate-50/50 focus:border-red-600 focus:shadow-lg focus:shadow-red-100 focus:bg-white" placeholder="••••••••" required>
        </div>

        <button type="submit" id="submitBtn" class="w-full py-3.5 md:py-4 mt-2 rounded-xl font-bold text-white transition-all duration-300 shadow-lg bg-red-600 hover:bg-red-700 shadow-red-200 active:scale-95">
          Masuk Sekarang
        </button>
      </form>

      <div class="mt-8 pt-6 border-t border-slate-100 text-center space-y-3">
        <p class="text-sm text-slate-500">
          Belum punya akun? <a href="register.html" class="text-red-600 font-bold hover:text-red-700 transition-colors">Daftar Gratis</a>
        </p>
      </div>
    </div>
  </div>

  <script>
    const loginForm = document.getElementById('loginForm');
    const submitBtn = document.getElementById('submitBtn');
    const errorMessage = document.getElementById('error-message');

    loginForm.addEventListener('submit', (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      // Loading state UI
      submitBtn.disabled = true;
      submitBtn.innerHTML = 'Memverifikasi...';
      submitBtn.classList.add('bg-slate-300', 'cursor-not-allowed');
      submitBtn.classList.remove('bg-red-600', 'hover:bg-red-700', 'active:scale-95');
      errorMessage.classList.add('hidden');

      // Simulasi delay jaringan (1 detik)
      setTimeout(() => {
        // Pengecekan Dummy Data
        if (email === 'peserta@litera.com' && password === 'password123') {
          
          // Buat data user dummy
          const dummyUser = {
            id: 1,
            nama: 'Anisa Panduwinata',
            email: 'peserta@litera.com',
            role: 'peserta'
          };

          // Simpan token dan data user ke localStorage
          localStorage.setItem('token', 'dummy-token-xyz-123');
          localStorage.setItem('user', JSON.stringify(dummyUser));

          // Arahkan ke halaman dashboard
          window.location.href = 'dashboard.html';

        } else {
          // Jika email atau password salah
          errorMessage.innerText = 'Email atau password salah! Silakan periksa kembali.';
          errorMessage.classList.remove('hidden');

          // Kembalikan tombol ke state semula
          submitBtn.disabled = false;
          submitBtn.innerHTML = 'Masuk Sekarang';
          submitBtn.classList.remove('bg-slate-300', 'cursor-not-allowed');
          submitBtn.classList.add('bg-red-600', 'hover:bg-red-700', 'active:scale-95');
        }
      }, 1000); // Penundaan 1 detik untuk efek realistis
    });
  </script>
</body>
</html>
